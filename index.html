
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus-AI | Sistema Activo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: sans-serif; }
        .neon-glow { border: 1px solid #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }
    </style>
</head>
<body class="p-6 flex flex-col items-center min-h-screen justify-center">
    <div class="max-w-md w-full text-center">
        <h1 class="text-5xl font-black text-blue-600 italic mb-2 tracking-tighter">NEXUS-AI</h1>
        <p class="text-blue-400 text-xs font-bold tracking-[0.3em] uppercase mb-8">Intelligence Engine</p>

        <div class="bg-slate-900/80 rounded-3xl p-6 neon-glow">
            <textarea id="userInput" class="w-full bg-transparent outline-none h-32 text-lg placeholder-slate-700 resize-none" placeholder="Escribe un comando..."></textarea>
            <button onclick="preguntarIA()" id="btn-fusion" class="bg-blue-600 w-full mt-4 py-4 rounded-2xl font-black uppercase tracking-widest active:scale-95 transition-all shadow-lg shadow-blue-900/50">FUSIONAR IA</button>
        </div>

        <div id="status" class="mt-6 text-xs font-mono text-slate-500 uppercase italic">Sistema listo en Jamundí</div>

        <div class="mt-6 p-6 rounded-3xl bg-slate-900/40 border border-slate-800 text-left">
            <div id="output" class="text-slate-300 text-sm leading-relaxed text-left">Esperando entrada de datos...</div>
        </div>
    </div>

    <script>
        async function preguntarIA() {
            const prompt = document.getElementById('userInput').value;
            const output = document.getElementById('output');
            const status = document.getElementById('status');
            const btn = document.getElementById('btn-fusion');
            const API_KEY = "AIzaSyA7V18U8e7K4lr8lnITE4xFfOHukP7rsK4";

            if(!prompt) return;

            btn.disabled = true;
            status.innerText = "Sincronizando con Google v1...";
            output.innerHTML = "<div class='animate-pulse text-blue-500 font-bold'>GENERANDO...</div>";

            try {
                // RUTA ESTABLE v1 (La más confiable)
                const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content) {
                    const respuesta = data.candidates[0].content.parts[0].text;
                    output.innerHTML = respuesta.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
                    status.innerText = "Nexus-AI: Conexión Exitosa";
                } else {
                    // Si falla, mostramos el error técnico para saber qué pasó
                    output.innerHTML = "<span class='text-red-400 font-bold'>Error técnico:</span><br>" + (data.error ? data.error.message : "Modelo no disponible");
                    status.innerText = "Fallo en el motor";
                }
            } catch (e) {
                output.innerHTML = "<span class='text-red-500 italic'>Error de red. Usa modo Incógnito.</span>";
                status.innerText = "Sin conexión";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus-AI | Multi-Materia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        .neon-blue { box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        .subject-btn { transition: all 0.2s; border: 1px solid rgba(255,255,255,0.1); }
        .subject-btn:active { scale: 0.95; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-300">

    <nav class="p-4 flex justify-between items-center max-w-4xl mx-auto">
        <h1 class="text-2xl font-black italic text-blue-600">NEXUS-AI</h1>
        <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 bg-slate-200 dark:bg-slate-800 rounded-full">🌓</button>
    </nav>

    <main class="max-w-md mx-auto p-6">
        
        <div class="grid grid-cols-2 gap-3 mb-6">
            <button onclick="setMateria('Matemáticas 📐')" class="subject-btn p-3 rounded-2xl bg-white dark:bg-slate-900 shadow-sm">Matemáticas 📐</button>
            <button onclick="setMateria('Biología 🧬')" class="subject-btn p-3 rounded-2xl bg-white dark:bg-slate-900 shadow-sm">Biología 🧬</button>
            <button onclick="setMateria('Lenguaje 📚')" class="subject-btn p-3 rounded-2xl bg-white dark:bg-slate-900 shadow-sm">Lenguaje 📚</button>
            <button onclick="setMateria('Inglés 🇬🇧')" class="subject-btn p-3 rounded-2xl bg-white dark:bg-slate-900 shadow-sm">Inglés 🇬🇧</button>
        </div>

        <div class="bg-white dark:bg-slate-900 rounded-3xl p-4 shadow-xl border border-slate-200 dark:border-slate-800">
            <div id="materia-actual" class="text-xs font-bold text-blue-500 mb-2 uppercase tracking-widest text-center">Selecciona una materia</div>
            
            <textarea id="userInput" class="w-full bg-transparent border-none outline-none h-24 resize-none" placeholder="Haz tu pregunta..."></textarea>
            
            <div class="flex gap-2 mt-2">
                <label class="cursor-pointer bg-slate-100 dark:bg-slate-800 p-3 rounded-xl flex-1 text-center">
                    📷 <input type="file" accept="image/*" class="hidden" onchange="handleImage(this)">
                </label>
                <button onclick="startVoice()" class="bg-slate-100 dark:bg-slate-800 p-3 rounded-xl flex-1">🎤</button>
            </div>

            <button onclick="preguntarIA()" id="btn-main" class="w-full mt-4 bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700 transition-all">FUSIONAR IA (Gemini + GPT)</button>
        </div>

        <div class="mt-6 p-4 rounded-2xl bg-gradient-to-r from-amber-400 to-orange-500 text-white shadow-lg">
            <div class="flex justify-between items-center">
                <div>
                    <p class="font-bold">Nexus Pro ✨</p>
                    <p class="text-xs">Respuestas 2x más rápidas</p>
                </div>
                <button onclick="window.location.href='https://paypal.me/tu-cuenta/5'" class="bg-white text-orange-600 px-4 py-2 rounded-xl font-black text-sm">$5 USD</button>
            </div>
        </div>

        <div id="output" class="mt-6 p-6 rounded-3xl bg-white dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 text-sm leading-relaxed min-h-[100px]">
            La respuesta aparecerá aquí...
        </div>
    </main>

    <script>
        let materiaSeleccionada = "";
        const API_KEY = "TU_API_KEY_AQUI"; // REEMPLAZA CON TU KEY

        function setMateria(m) {
            materiaSeleccionada = m;
            document.getElementById('materia-actual').innerText = "Modo: " + m;
        }

        function startVoice() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'es-ES';
            recognition.onresult = (event) => {
                document.getElementById('userInput').value = event.results[0][0].transcript;
            };
            recognition.start();
        }

        async function preguntarIA() {
            const input = document.getElementById('userInput').value;
            const output = document.getElementById('output');
            if(!input) return;

            output.innerHTML = "<span class='animate-pulse'>Procesando con algoritmos combinados...</span>";

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Actúa como una fusión de ChatGPT y Gemini experto en ${materiaSeleccionada}. Pregunta: ${input}` }] }]
                    })
                });
                const data = await response.json();
                output.innerText = data.candidates[0].content.parts[0].text;
            } catch (e) {
                output.innerText = "Error al conectar con el núcleo de IA.";
            }
        }

        function handleImage(input) {
            if (input.files && input.files[0]) {
                document.getElementById('output').innerText = "Imagen cargada: " + input.files[0].name + ". (Para analizarla necesitas convertirla a Base64 en el código)";
            }
        }
    </script>
</body>
</html>
