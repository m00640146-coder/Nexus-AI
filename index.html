<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus-AI | Inteligencia Real</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; }
        .neon-border { border: 1px solid #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body class="p-6 flex flex-col items-center min-h-screen">
    <div class="max-w-md w-full">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-black text-blue-500 italic uppercase">Nexus-AI</h1>
            <p class="text-gray-400 text-xs tracking-widest uppercase">Motor: Google Gemini Pro</p>
        </header>

        <div class="bg-gray-900/50 rounded-3xl p-5 neon-border">
            <textarea id="userInput" class="w-full bg-transparent outline-none h-32 text-lg placeholder-gray-600 resize-none" placeholder="Escribe tu pregunta aquí..."></textarea>
            <button onclick="preguntarIA()" id="btn-fusion" class="bg-blue-600 w-full mt-4 py-3 rounded-2xl font-bold uppercase tracking-widest hover:bg-blue-500 transition-all">Fusionar Inteligencia</button>
        </div>

        <div class="mt-8 p-6 rounded-3xl bg-blue-900/10 border border-blue-500/20">
            <h2 class="text-blue-400 font-bold text-sm mb-3 uppercase tracking-tighter">Respuesta Nexus ✨</h2>
            <div id="output" class="text-gray-300 italic text-sm leading-relaxed">Esperando comando desde Jamundí...</div>
        </div>
    </div>

    <script>
        const MI_API_KEY = "AIzaSyA7V18U8e7K4lr8lnITE4xFfOHukP7rsK4";

        async function preguntarIA() {
            const prompt = document.getElementById('userInput').value;
            const output = document.getElementById('output');
            const btn = document.getElementById('btn-fusion');

            if(!prompt) return alert("Escribe algo primero");

            output.innerHTML = "<span class='animate-pulse text-blue-400'>Conectando con los servidores de Google...</span>";
            btn.disabled = true;
            btn.style.opacity = "0.5";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${MI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    output.innerHTML = "Error de Google: " + data.error.message;
                } else {
                    const textoFinal = data.candidates[0].content.parts[0].text;
                    output.innerHTML = textoFinal.replace(/\n/g, '<br>');
                }
            } catch (error) {
                output.innerHTML = "Error de red. Intenta de nuevo.";
            } finally {
                btn.disabled = false;
                btn.style.opacity = "1";
            }
        }
    </script>
</body>
</html>
