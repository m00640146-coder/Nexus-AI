<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus-AI | Inteligencia Real</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; }
        .neon-border { border: 1px solid #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body class="p-6 flex flex-col items-center min-h-screen">
    <div class="max-w-md w-full">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-black text-blue-500 italic uppercase tracking-tighter">Nexus-AI</h1>
            <p class="text-gray-400 text-xs tracking-widest uppercase">Motor: Google Gemini Flash</p>
        </header>

        <div class="bg-gray-900/50 rounded-3xl p-5 neon-border">
            <textarea id="userInput" class="w-full bg-transparent outline-none h-32 text-lg placeholder-gray-600 resize-none" placeholder="Escribe tu comando..."></textarea>
            <button onclick="preguntarIA()" id="btn-fusion" class="bg-blue-600 w-full mt-4 py-4 rounded-2xl font-bold uppercase tracking-widest active:scale-95 transition-all">Fusionar Inteligencia</button>
        </div>

        <div class="mt-8 p-6 rounded-3xl bg-blue-900/10 border border-blue-500/20">
            <h2 class="text-blue-400 font-bold text-sm mb-3 uppercase tracking-widest text-center">Respuesta Nexus ✨</h2>
            <div id="output" class="text-gray-300 text-sm leading-relaxed text-left">Esperando comando desde Jamundí...</div>
        </div>
    </div>

    <script>
        const MI_API_KEY = "AIzaSyA7V18U8e7K4lr8lnITE4xFfOHukP7rsK4";

        async function preguntarIA() {
            const prompt = document.getElementById('userInput').value;
            const output = document.getElementById('output');
            const btn = document.getElementById('btn-fusion');

            if(!prompt) return alert("Escribe algo primero.");

            output.innerHTML = "<span class='animate-pulse text-blue-400 font-bold text-center block'>GENERANDO RESPUESTA...</span>";
            btn.disabled = true;

            try {
                // NOMBRE DE MODELO CORREGIDO PARA VERSIÓN 1
                const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${MI_API_KEY}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    output.innerHTML = "<span class='text-red-400'>Error de Google: " + data.error.message + "</span>";
                } else if (data.candidates && data.candidates[0].content) {
                    const textoFinal = data.candidates[0].content.parts[0].text;
                    output.innerHTML = textoFinal.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
                } else {
                    output.innerHTML = "No se pudo generar respuesta. Intenta de nuevo.";
                }
            } catch (error) {
                output.innerHTML = "<span class='text-red-500 italic'>Error de conexión.</span>";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
